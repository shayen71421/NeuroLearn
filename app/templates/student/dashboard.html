{% extends "base.html" %}

{% block content %}
  <div class="page-header">
    <h1>Welcome back</h1>
    <p class="subtitle">Your learning overview for today.</p>
  </div>
  <div class="card-grid">
    <div class="card">
      <div class="card-title">Active goal</div>
      <div class="metric">--</div>
    </div>
    <div class="card">
      <div class="card-title">Mastery score</div>
      <div class="metric">--</div>
    </div>
    <div class="card">
      <div class="card-title">Recent sessions</div>
      <div class="metric">--</div>
    </div>
  </div>
  <div class="card">
    <h3>Progress snapshot</h3>
    <canvas id="student-progress-chart" height="140"></canvas>
  </div>
{% endblock %}

{% block scripts %}
  <script src="{{ url_for('static', path='js/charts.js') }}"></script>
  <script>
    if (window.NeuroCharts) {
      window.NeuroCharts.renderStudentDashboard();
    }
  </script>
{% endblock %}
