{% extends "base.html" %}

{% block content %}
  <div class="page-header">
    <h1>Settings</h1>
    <p class="subtitle">Configure system defaults.</p>
  </div>
  <div class="card">
    <form class="form">
      <label>
        Default retrieval top-k
        <input type="number" value="5" min="1" />
      </label>
      <label>
        Minimum similarity threshold
        <input type="number" value="0.32" step="0.01" min="0" max="1" />
      </label>
      <button type="button" class="btn">Save settings</button>
    </form>
  </div>
{% endblock %}
