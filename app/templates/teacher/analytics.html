{% extends "base.html" %}

{% block content %}
  <div class="page-header">
    <h1>Analytics</h1>
    <p class="subtitle">Learning performance and engagement.</p>
  </div>
  <div class="card-grid">
    <div class="card">
      <h3>Mastery growth</h3>
      <canvas id="teacher-mastery-chart" height="140"></canvas>
    </div>
    <div class="card">
      <h3>Engagement</h3>
      <canvas id="teacher-engagement-chart" height="140"></canvas>
    </div>
  </div>
{% endblock %}

{% block scripts %}
  <script src="{{ url_for('static', path='js/charts.js') }}"></script>
  <script>
    if (window.NeuroCharts) {
      window.NeuroCharts.renderTeacherAnalytics();
    }
  </script>
{% endblock %}
