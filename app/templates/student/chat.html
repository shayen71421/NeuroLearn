{% extends "base.html" %}

{% block content %}
  <div class="page-header">
    <h1>AI Tutor Chat</h1>
    <p class="subtitle">Ask questions and get personalized explanations.</p>
  </div>
  <div class="chat-layout" data-student-id="{{ user.student_id }}">
    <aside class="chat-sidebar">
      <div class="chat-sidebar-header">Conversations</div>
      <div class="chat-list" id="chat-list">
        <button class="chat-item active" type="button">Current session</button>
      </div>
    </aside>
    <section class="chat-main">
      <div id="chat-messages" class="chat-messages"></div>
      <div class="chat-check">
        <div class="hint" id="check-question">No check question yet.</div>
        <form id="check-form" class="chat-form">
          <input id="check-input" type="text" placeholder="Answer the check question" />
          <button class="btn" type="submit">Submit</button>
        </form>
      </div>
      <form id="chat-form" class="chat-form">
        <input id="chat-input" type="text" placeholder="Ask your tutor..." autocomplete="off" />
        <button class="btn" type="submit">Send</button>
      </form>
    </section>
  </div>
{% endblock %}

{% block scripts %}
  <script src="{{ url_for('static', path='js/chat.js') }}"></script>
{% endblock %}
